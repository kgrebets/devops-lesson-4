services:

  # PostgreSQL database
  db:
    # Use official PostgreSQL image
    image: postgres:17

    # Load database settings from .env
    env_file:
      - .env

    # Persist database files between container restarts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

      # Django application
  web:
    # Build image from Dockerfile in ./app
    build: ./app

    # Load environment variables from .env
    env_file:
      - .env

    # Mount local source code into container
    volumes:
      - ./app:/app

    # Start after PostgreSQL container
    depends_on:
      db:
        condition: service_healthy

  # Web server
  nginx:
    # Use official Nginx image
    image: nginx:latest

    # Expose Nginx on localhost:5000
    ports:
      - "5000:80"

    # Mount custom Nginx configuration
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

    # Start after Django container
    depends_on:
      - web
        

# Named volume for PostgreSQL data persistence
volumes:
  postgres_data: